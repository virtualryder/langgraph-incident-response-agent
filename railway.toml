# Railway deployment configuration.
# Docs: https://docs.railway.com/reference/config-as-code
#
# Build:   uses the project's Dockerfile.
# Volume:  provision in Railway dashboard (Settings → Volumes) and mount
#          at /data. The container sets AUDIT_LOG_DIR=/data/audit and
#          CHROMA_PERSIST_DIR=/data/chroma so both audit logs and the
#          incident knowledge-base persistence survive redeploys.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Streamlit's built-in liveness endpoint.
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 30

# Restart on crash; bounded retries before backing off.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Single replica. Scale up in the dashboard if usage grows.
numReplicas = 1

# Dockerfile CMD starts Streamlit — no override needed.
# startCommand =
